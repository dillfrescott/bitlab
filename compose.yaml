services:
  frontend:
    build: .
    container_name: bitmagnet-stremio-frontend
    restart: unless-stopped
    ports:
      - "${PORT:-7000}:${PORT:-7000}"
    environment:
      - PORT=${PORT:-7000}
      - BASE_URL=${BASE_URL:-}
      - BITMAGNET_URL=${BITMAGNET_URL:-http://bitmagnet:3333}
      - METADATA_TIMEOUT_MS=${METADATA_TIMEOUT_MS:-90000}
    depends_on:
      postgres:
        condition: service_healthy

  bitmagnet:
    image: ghcr.io/bitmagnet-io/bitmagnet:latest
    container_name: bitmagnet
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - PROCESSOR_CONCURRENCY=4
      - DHT_CRAWLER_SCALING_FACTOR=4
    volumes:
      - ./config/bitmagnet:/root/.config/bitmagnet
    command:
      - worker
      - run
      - --keys=http_server
      - --keys=queue_server
      - --keys=dht_crawler
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    container_name: bitmagnet-postgres
    volumes:
      - ${POSTGRES_DATA_PATH:-/mnt/drive/postgres}:/var/lib/postgresql
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-bitmagnet}
      - PGUSER=${PGUSER:-postgres}
    shm_size: 1g
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready
      start_period: 20s
      interval: 10s
